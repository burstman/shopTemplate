# fly.toml app configuration file generated for shop001 on 2026-04-25T19:36:42+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'shop001'
primary_region = 'sjc'

[build]

[[mounts]]
  source = 'shop_uploads'
  destination = '/app/public/images'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[[http_service.checks]]
  grace_period = "90s"
  interval = "30s"
  method = "get"
  path = "/health"
  timeout = "5s"
